        // Renderizar productos
        function renderProducts(filter = 'todos') {
            const grid = document.getElementById('products-grid');
            const emptyState = document.getElementById('empty-state');
            const resultsCount = document.getElementById('results-count');
            
            let filteredProducts = products;
            
            if (filter !== 'todos') {
                filteredProducts = products.filter(product => 
                    product.categories.includes(filter)
                );
            }
            
            if (filteredProducts.length === 0) {
                grid.style.display = 'none';
                emptyState.classList.add('active');
                resultsCount.textContent = '0';
                return;
            }
            
            grid.style.display = 'grid';
            emptyState.classList.remove('active');
            resultsCount.textContent = filteredProducts.length;
            
            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card" data-categories="${product.categories.join(' ')}">
                    <div class="product-image-container" onclick="openLightbox('${product.image}', '${product.name}', '${formatPrice(product.price)}')">
                        <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                        <div class="zoom-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                                <line x1="11" y1="8" x2="11" y2="14"/>
                                <line x1="8" y1="11" x2="14" y2="11"/>
                            </svg>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-description">${product.description}</div>
                        <div class="product-footer">
                            <div>
                                <span class="price-label">Desde</span>
                                <div class="product-price">${formatPrice(product.price)}</div>
                            </div>
                            <a href="https://wa.me/573019989093?text=Hola,%20me%20interesa%20el%20producto:%20${encodeURIComponent(product.name)}%20-%20${formatPrice(product.price)}"

        // Formatear precio
        function formatPrice(price) {
            return '$' + price.toLocaleString('es-CO');
        }

        // Filtros
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderProducts(this.dataset.filter);
                window.scrollTo({ top: 400, behavior: 'smooth' });
            });
        });

        // Lightbox
        function openLightbox(image, name, price) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImage = document.getElementById('lightbox-image');
            const lightboxTitle = document.getElementById('lightbox-title');
            const lightboxPrice = document.getElementById('lightbox-price');
            
            lightboxImage.src = image;
            lightboxImage.alt = name;
            lightboxTitle.textContent = name;
            lightboxPrice.textContent = price;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        // Scroll to top
        const scrollTop = document.getElementById('scroll-top');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 500) {
                scrollTop.classList.add('visible');
            } else {
                scrollTop.classList.remove('visible');
            }
        });

        scrollTop.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Inicializar
        renderProducts();
    </script>
